name: Desktop CI

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: desktop-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Quality checks
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7
      - uses: jdx/mise-action@v4
        with:
          cache: true
      - run: pnpm install --frozen-lockfile
      - run: pnpm version:check
      - run: pnpm lint
      - run: pnpm test
      - run: pnpm build

      - name: Upload web build
        uses: actions/upload-artifact@v4
        with:
          name: agent-explorer-web-dist-${{ github.sha }}
          path: dist
          if-no-files-found: error

  web-e2e:
    name: Web smoke and E2E
    needs: quality
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7
      - uses: jdx/mise-action@v4
        with:
          cache: true
      - run: pnpm install --frozen-lockfile
      - uses: actions/download-artifact@v4
        with:
          name: agent-explorer-web-dist-${{ github.sha }}
          path: dist
      - name: Install Playwright Chromium
        run: uv run --with playwright --no-project python -m playwright install --with-deps chromium
      - run: pnpm test:smoke
      - run: pnpm test:e2e
      - name: Upload browser failure artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: agent-explorer-web-e2e-failures-${{ github.sha }}
          path: test-results
          if-no-files-found: ignore

  desktop:
    name: ${{ matrix.name }}
    needs: quality
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS ARM64
            os: macos-15
            args: --target aarch64-apple-darwin --bundles app,dmg
            artifact: agent-explorer-macos-arm64
          - name: Windows x64
            os: windows-2025
            args: --bundles nsis
            artifact: agent-explorer-windows-x64
          - name: Linux x64
            os: ubuntu-24.04
            args: --bundles deb,appimage
            artifact: agent-explorer-linux-x64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7
      - uses: jdx/mise-action@v4
        with:
          cache: true
      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            curl \
            file \
            libayatana-appindicator3-dev \
            libssl-dev \
            libwebkit2gtk-4.1-dev \
            libxdo-dev \
            librsvg2-dev \
            patchelf \
            wget
      - run: pnpm install --frozen-lockfile
      - uses: tauri-apps/tauri-action@action-v1.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: ${{ matrix.args }}
      - name: Upload desktop bundles
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: src-tauri/target/**/release/bundle/**
          if-no-files-found: error
