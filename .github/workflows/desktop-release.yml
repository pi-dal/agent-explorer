name: Desktop Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: Existing v-prefixed tag to publish
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: desktop-release-${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
  cancel-in-progress: false

jobs:
  prepare:
    name: Validate release
    runs-on: ubuntu-24.04
    outputs:
      tag: ${{ steps.release.outputs.tag }}
      release_id: ${{ steps.github_release.outputs.release_id }}
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}
      - uses: jdx/mise-action@v4
      - run: pnpm install --frozen-lockfile
      - id: release
        shell: bash
        run: |
          tag="${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}"
          if [[ ! "$tag" =~ ^v[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z.-]+)?$ ]]; then
            echo "Invalid release tag: $tag" >&2
            exit 1
          fi
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          EXPECTED_VERSION="$tag" pnpm version:check
      - run: pnpm lint
      - run: pnpm test
      - name: Validate updater signing secret
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        shell: bash
        run: |
          required=(
            TAURI_SIGNING_PRIVATE_KEY
          )
          missing=()
          for name in "${required[@]}"; do
            if [[ -z "${!name}" ]]; then
              missing+=("$name")
            fi
          done
          if ((${#missing[@]})); then
            echo "::error::Missing required release secrets: ${missing[*]}"
            exit 1
          fi
      - id: github_release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.release.outputs.tag }}
        shell: bash
        run: |
          release_id="$(gh api "repos/${GITHUB_REPOSITORY}/releases/tags/${TAG}" --jq '.id' 2>/dev/null || true)"
          if [[ -z "$release_id" ]]; then
            release_id="$(gh api --method POST "repos/${GITHUB_REPOSITORY}/releases" \
              -f tag_name="$TAG" \
              -f name="Agent Explorer $TAG" \
              -F draft=true \
              -F generate_release_notes=true \
              --jq '.id')"
          fi
          echo "release_id=$release_id" >> "$GITHUB_OUTPUT"

  publish:
    name: ${{ matrix.name }}
    needs: prepare
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        include:
          - name: macOS ARM64
            os: macos-15
            args: --config src-tauri/tauri.release.conf.json --target aarch64-apple-darwin --bundles app,dmg
          - name: Windows x64
            os: windows-2025
            args: --config src-tauri/tauri.release.conf.json --bundles nsis
          - name: Linux x64
            os: ubuntu-24.04
            args: --config src-tauri/tauri.release.conf.json --bundles deb,appimage
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ needs.prepare.outputs.tag }}
      - uses: jdx/mise-action@v4
        with:
          cache: true
      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            curl \
            file \
            libayatana-appindicator3-dev \
            libssl-dev \
            libwebkit2gtk-4.1-dev \
            libxdo-dev \
            librsvg2-dev \
            patchelf \
            wget
      - run: pnpm install --frozen-lockfile
      - uses: tauri-apps/tauri-action@action-v1.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          releaseId: ${{ needs.prepare.outputs.release_id }}
          tagName: ${{ needs.prepare.outputs.tag }}
          args: ${{ matrix.args }}
          retryAttempts: 2

  finalize:
    name: Publish GitHub Release
    needs: [prepare, publish]
    runs-on: ubuntu-24.04
    steps:
      - name: Publish completed release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_ID: ${{ needs.prepare.outputs.release_id }}
        run: gh api --method PATCH "repos/${GITHUB_REPOSITORY}/releases/${RELEASE_ID}" -F draft=false >/dev/null
