name: Desktop Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: Existing v-prefixed tag to publish
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: desktop-release-${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
  cancel-in-progress: false

jobs:
  prepare:
    name: Validate release
    runs-on: ubuntu-24.04
    outputs:
      tag: ${{ steps.release.outputs.tag }}
      release_id: ${{ steps.github_release.outputs.release_id }}
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}
      - uses: jdx/mise-action@v4
      - run: pnpm install --frozen-lockfile
      - id: release
        shell: bash
        run: |
          tag="${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}"
          if [[ ! "$tag" =~ ^v[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z.-]+)?$ ]]; then
            echo "Invalid release tag: $tag" >&2
            exit 1
          fi
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          EXPECTED_VERSION="$tag" pnpm version:check
      - run: pnpm lint
      - run: pnpm test
      - run: pnpm build
      - name: Install Playwright Chromium
        run: uv run --with playwright --no-project python -m playwright install --with-deps chromium
      - run: pnpm test:smoke
      - name: Validate updater signing secret
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        shell: bash
        run: |
          required=(
            TAURI_SIGNING_PRIVATE_KEY
          )
          missing=()
          for name in "${required[@]}"; do
            if [[ -z "${!name}" ]]; then
              missing+=("$name")
            fi
          done
          if ((${#missing[@]})); then
            echo "::error::Missing required release secrets: ${missing[*]}"
            exit 1
          fi
      - name: Validate Apple signing and notarization secrets
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_KEY_CONTENT: ${{ secrets.APPLE_API_KEY_CONTENT }}
        shell: bash
        run: |
          required=(
            APPLE_CERTIFICATE
            APPLE_CERTIFICATE_PASSWORD
            APPLE_SIGNING_IDENTITY
            KEYCHAIN_PASSWORD
            APPLE_API_ISSUER
            APPLE_API_KEY
            APPLE_API_KEY_CONTENT
          )
          missing=()
          for name in "${required[@]}"; do
            if [[ -z "${!name}" ]]; then
              missing+=("$name")
            fi
          done
          if ((${#missing[@]})); then
            echo "::error::Missing required macOS signing/notarization secrets: ${missing[*]}"
            exit 1
          fi
      - id: github_release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.release.outputs.tag }}
        shell: bash
        run: |
          release_id=""
          if ! release_id="$(gh api "repos/${GITHUB_REPOSITORY}/releases/tags/${TAG}" --jq '.id' 2>/dev/null)"; then
            release_id=""
          fi
          if [[ -z "$release_id" ]]; then
            release_id="$(gh api --method POST "repos/${GITHUB_REPOSITORY}/releases" \
              -f tag_name="$TAG" \
              -f name="Agent Explorer $TAG" \
              -F draft=true \
              -F generate_release_notes=true \
              --jq '.id')"
          fi
          echo "release_id=$release_id" >> "$GITHUB_OUTPUT"

  publish:
    name: ${{ matrix.name }}
    needs: prepare
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        include:
          - name: macOS ARM64
            os: macos-15
            args: --config src-tauri/tauri.release.conf.json --target aarch64-apple-darwin --bundles app,dmg
          - name: Windows x64
            os: windows-2025
            args: --config src-tauri/tauri.release.conf.json --bundles nsis
          - name: Linux x64
            os: ubuntu-24.04
            args: --config src-tauri/tauri.release.conf.json --bundles deb,appimage
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ needs.prepare.outputs.tag }}
      - uses: jdx/mise-action@v4
        with:
          cache: true
      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            curl \
            file \
            libayatana-appindicator3-dev \
            libssl-dev \
            libwebkit2gtk-4.1-dev \
            libxdo-dev \
            librsvg2-dev \
            patchelf \
            wget
      - run: pnpm install --frozen-lockfile
      - name: Import Apple Developer ID certificate
        if: runner.os == 'macOS'
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        shell: bash
        run: |
          certificate_path="$RUNNER_TEMP/developer-id.p12"
          keychain_path="$RUNNER_TEMP/build.keychain-db"
          printf '%s' "$APPLE_CERTIFICATE" | base64 --decode > "$certificate_path"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$keychain_path"
          security set-keychain-settings -lut 21600 "$keychain_path"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$keychain_path"
          security import "$certificate_path" \
            -k "$keychain_path" \
            -P "$APPLE_CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/productsign \
            -T /usr/bin/security
          security list-keychains -d user -s "$keychain_path" login.keychain-db
          security default-keychain -s "$keychain_path"
          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: \
            -s -k "$KEYCHAIN_PASSWORD" "$keychain_path"
          security find-identity -v -p codesigning "$keychain_path"
      - name: Write App Store Connect API key
        if: runner.os == 'macOS'
        env:
          APPLE_API_KEY_CONTENT: ${{ secrets.APPLE_API_KEY_CONTENT }}
        shell: bash
        run: |
          key_path="$RUNNER_TEMP/AuthKey.p8"
          printf '%s' "$APPLE_API_KEY_CONTENT" > "$key_path"
          chmod 600 "$key_path"
      - name: Build and upload macOS release
        if: runner.os == 'macOS'
        uses: tauri-apps/tauri-action@action-v1.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_KEY_PATH: ${{ runner.temp }}/AuthKey.p8
        with:
          releaseId: ${{ needs.prepare.outputs.release_id }}
          tagName: ${{ needs.prepare.outputs.tag }}
          args: ${{ matrix.args }}
          retryAttempts: 2
      - name: Build and upload non-macOS release
        if: runner.os != 'macOS'
        uses: tauri-apps/tauri-action@action-v1.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          releaseId: ${{ needs.prepare.outputs.release_id }}
          tagName: ${{ needs.prepare.outputs.tag }}
          args: ${{ matrix.args }}
          retryAttempts: 2

  finalize:
    name: Publish GitHub Release
    needs: [prepare, publish]
    runs-on: ubuntu-24.04
    steps:
      - name: Publish completed release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_ID: ${{ needs.prepare.outputs.release_id }}
        run: gh api --method PATCH "repos/${GITHUB_REPOSITORY}/releases/${RELEASE_ID}" -F draft=false >/dev/null
